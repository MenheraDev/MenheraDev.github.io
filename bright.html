<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>点灯時刻</title>
    <style>
        @font-face {
            font-family: "Bender";
            src: url("./src/font/Bender.otf");
        }
        body {
            margin: 0;
            background-color: #1a1d1f; /* グレーの背景 */
            font-family: "Bender", sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: white;
        }
        .container {
            width: 350px; /* 横幅固定 */
            padding: 20px;
            background-color: #2c3133;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            text-align: left;
        }
        .banner {
            display: flex;
            height: 30px;
            margin-bottom: 15px;
        }
        .banner div {
            flex: 1;
        }
        .banner div:nth-child(1) { background-color: #ED7D95; }
        .banner div:nth-child(2) { background-color: #E7D600; }
        .banner div:nth-child(3) { background-color: #D81C2F; }
        .banner div:nth-child(4) { background-color: #FF5800; }
        .banner div:nth-child(5) { background-color: #84C36E; }
        .banner div:nth-child(6) { background-color: #9CA5B9; }
        .banner div:nth-child(7) { background-color: #A664A0; }
        .banner div:nth-child(8) { background-color: #01B7ED; }
        .banner div:nth-child(9) { background-color: #485EC6; }
        .banner div:nth-child(10) { background-color: #F8C8C4; }
        .banner div:nth-child(11) { background-color: #37B484; }
        .banner div:nth-child(12) { background-color: #A99E98; }
        .time {
            font-size: 36px; /* 基本の時刻サイズ */
            margin-bottom: 5px;
        }
        .milliseconds {
            font-size: 30px; /* ミリ秒サイズ */
        }
        .description {
            font-size: 16px;
            margin-bottom: 5px;
        }
        .controls {
            display: flex;
            justify-content: space-between;
            margin-top: 5px; /* current-dateとの余白 */
        }
        #current-date {
            margin: 0 5px;
        }
        .button {
            background-color: #ddd;
            padding: 8px 12px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            transition: background-color 0.1s ease-in-out;
        }
        .button:hover {
            background-color: #ccc;
        }
        .error {
            color: #FF5800;
            font-size: 14px;
            margin-top: 8px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="banner">
            <div></div><div></div><div></div><div></div><div></div>
            <div></div><div></div><div></div><div></div><div></div>
            <div></div><div></div>
        </div>
        <div class="description">現在時刻:</div>
        <div class="time" id="current-time"></div>
        <div class="description">日没時刻:</div>
        <div class="time" id="sunset-time"></div>
        <div class="description">日没後30分:</div>
        <div class="time" id="sunset-plus30"></div>
        <div class="description">3分18秒前:</div>
        <div class="time" id="minus318"></div>
        <div class="description">2分25秒前:</div>
        <div class="time" id="minus225"></div>
        <div class="controls">
            <button class="button" id="prev-day">前の日</button>
            <div id="current-date"></div>
            <button class="button" id="next-day">次の日</button>
        </div>
        <div class="error" id="error-msg"></div>
    </div>

    <!-- SunCalc: 国立天文台と同等精度の天文計算ライブラリ -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/suncalc/1.9.0/suncalc.min.js"
            integrity="sha512-2CKBL2Y5bJGOBi2ZPFXb0aBumfqLjbJAO0QrqP7xhZkQyTcc6lBkIRixAqoFpGwCsLX8ZRMzDKSo6k0MEo5Q=="
            crossorigin="anonymous"
            referrerpolicy="no-referrer"></script>

    <script>
        const lat = 35.6581; // 緯度
        const lon = 139.7414; // 経度
        const tz = 'Asia/Tokyo';
        let currentDate = new Date();
        let sunsetTime = null; // Date オブジェクトで日没時刻を保持

        function formatMilliseconds(ms) {
            const firstDigit = Math.floor(ms / 100); // 上位1桁
            return `${firstDigit}0`; // 2桁目を0に固定
        }

        function showError(msg) {
            document.getElementById('error-msg').textContent = msg;
        }

        function clearError() {
            document.getElementById('error-msg').textContent = '';
        }

        /**
         * SunCalc を使用して日没時刻を計算する。
         * SunCalc は IERS 標準の天文計算に基づき、
         * 国立天文台の日の入り時刻と概ね1分以内の誤差で一致する。
         */
        function calculateSunset() {
            clearError();

            // SunCalc が読み込めているか確認
            if (typeof SunCalc === 'undefined') {
                showError('エラー: SunCalc の読み込みに失敗しました。ネットワーク接続を確認してください。');
                sunsetTime = null;
                updateDisplay();
                return;
            }

            try {
                // currentDate の年月日を Asia/Tokyo 基準で取得し、
                // その日の正午(JST)を基点として SunCalc に渡す
                // （日付ズレを防ぐため、UTC 変換ではなく JST の年月日を明示的に使用する）
                const jstOffset = 9 * 60; // JST は UTC+9
                const localMidnight = new Date(currentDate);
                // currentDate の JST での年月日を取得
                const jstDateStr = currentDate.toLocaleDateString('ja-JP', {
                    timeZone: tz,
                    year: 'numeric',
                    month: '2-digit',
                    day: '2-digit'
                });
                // "2026/05/13" 形式を "2026-05-13" に変換して Date 生成
                const normalized = jstDateStr.replace(/\//g, '-');
                // JST 正午を UTC として構築（SunCalc はその日の太陽位置を正確に計算）
                const [y, m, d] = normalized.split('-').map(Number);
                const refDate = new Date(Date.UTC(y, m - 1, d, 12 - 9, 0, 0)); // JST12:00 = UTC03:00

                const times = SunCalc.getTimes(refDate, lat, lon);

                if (!times.sunset || isNaN(times.sunset.getTime())) {
                    showError('エラー: 日没時刻の計算に失敗しました。');
                    sunsetTime = null;
                    updateDisplay();
                    return;
                }

                sunsetTime = times.sunset;
                updateDisplay();

            } catch (e) {
                showError('エラー: 日没時刻の計算中に例外が発生しました。(' + e.message + ')');
                sunsetTime = null;
                updateDisplay();
            }
        }

        function updateDisplay() {
            const options = { timeZone: tz, hour12: false, year: 'numeric', month: '2-digit', day: '2-digit' };
            document.getElementById('current-date').textContent = currentDate.toLocaleDateString('ja-JP', options);

            const now = new Date();
            const formattedTime = now.toLocaleTimeString('ja-JP', { timeZone: tz, hour12: false });
            const milliseconds = formatMilliseconds(now.getMilliseconds());
            document.getElementById('current-time').innerHTML = `${formattedTime}.<span class="milliseconds">${milliseconds}</span>`;

            if (sunsetTime) {
                // 日没時刻
                const sunsetStr = sunsetTime.toLocaleTimeString('ja-JP', { timeZone: tz, hour12: false });
                document.getElementById('sunset-time').innerHTML = `${sunsetStr}.<span class="milliseconds">00</span>`;

                // 日没後30分（秒は切り捨て）
                const sunsetPlus30 = new Date(sunsetTime.getTime() + 30 * 60 * 1000);
                sunsetPlus30.setSeconds(0);
                const sunsetPlus30Str = sunsetPlus30.toLocaleTimeString('ja-JP', { timeZone: tz, hour12: false });
                document.getElementById('sunset-plus30').innerHTML = `${sunsetPlus30Str}.<span class="milliseconds">00</span>`;

                // 日没後30分の3分18秒前
                const minus318 = new Date(sunsetPlus30.getTime() - (3 * 60 + 18) * 1000);
                document.getElementById('minus318').innerHTML = `${minus318.toLocaleTimeString('ja-JP', { timeZone: tz, hour12: false })}.<span class="milliseconds">00</span>`;

                // 日没後30分の2分25秒前
                const minus225 = new Date(sunsetPlus30.getTime() - (2 * 60 + 25) * 1000);
                document.getElementById('minus225').innerHTML = `${minus225.toLocaleTimeString('ja-JP', { timeZone: tz, hour12: false })}.<span class="milliseconds">00</span>`;

            } else {
                // 日没時刻が取得できていない場合は「--:--:--」を表示
                const placeholder = '--:--:--.<span class="milliseconds">--</span>';
                document.getElementById('sunset-time').innerHTML = placeholder;
                document.getElementById('sunset-plus30').innerHTML = placeholder;
                document.getElementById('minus318').innerHTML = placeholder;
                document.getElementById('minus225').innerHTML = placeholder;
            }
        }

        document.getElementById('prev-day').addEventListener('click', () => {
            currentDate.setDate(currentDate.getDate() - 1);
            calculateSunset();
        });

        document.getElementById('next-day').addEventListener('click', () => {
            currentDate.setDate(currentDate.getDate() + 1);
            calculateSunset();
        });

        // 初回計算
        calculateSunset();

        // 0.1秒ごとに現在時刻を更新（日没時刻の再計算は不要）
        setInterval(updateDisplay, 100);
    </script>
</body>
</html>
